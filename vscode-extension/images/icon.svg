<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="templateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="configGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="64" x2="128" y2="64" stroke="#ffffff08" stroke-width="1"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#ffffff08" stroke-width="1"/>

  <!-- Template file (top-left) — x=8, width=34 -->
  <g filter="url(#glow)">
    <rect x="8" y="12" width="34" height="42" rx="4" fill="url(#templateGrad)" opacity="0.95"/>
    <!-- Folded corner -->
    <path d="M33 12 L42 21 L33 21 Z" fill="#1a3a7a"/>
    <rect x="33" y="12" width="9" height="9" rx="1" fill="#1e4db7"/>
    <!-- Code lines -->
    <rect x="13" y="26" width="20" height="2.5" rx="1" fill="#ffffff60"/>
    <rect x="13" y="31" width="15" height="2.5" rx="1" fill="#ffffff40"/>
    <rect x="13" y="36" width="18" height="2.5" rx="1" fill="#ffffff40"/>
    <rect x="13" y="41" width="12" height="2.5" rx="1" fill="#ffffff30"/>
    <!-- .template.cs label -->
    <rect x="8" y="46" width="34" height="8" rx="0" fill="#1e40af" opacity="0.8"/>
    <text x="25" y="53" font-family="monospace" font-size="4.5" fill="#93c5fd" text-anchor="middle">.template.cs</text>
  </g>

  <!-- Config/model file (bottom-left) — x=8, width=34 -->
  <g filter="url(#glow)">
    <rect x="8" y="72" width="34" height="38" rx="4" fill="url(#configGrad)" opacity="0.9"/>
    <!-- JSON lines -->
    <rect x="13" y="80" width="8" height="2" rx="1" fill="#ffffff70"/>
    <rect x="22" y="80" width="14" height="2" rx="1" fill="#ffffff40"/>
    <rect x="16" y="85" width="10" height="2" rx="1" fill="#ffffff50"/>
    <rect x="27" y="85" width="8" height="2" rx="1" fill="#ffffff30"/>
    <rect x="16" y="90" width="12" height="2" rx="1" fill="#ffffff50"/>
    <rect x="29" y="90" width="6" height="2" rx="1" fill="#ffffff30"/>
    <rect x="13" y="95" width="5" height="2" rx="1" fill="#ffffff70"/>
    <!-- .json label -->
    <rect x="8" y="102" width="34" height="8" rx="0" fill="#5b21b6" opacity="0.8"/>
    <text x="25" y="108.5" font-family="monospace" font-size="5" fill="#c4b5fd" text-anchor="middle">.json</text>
  </g>

  <!-- Arrow from template -->
  <g opacity="0.9">
    <line x1="44" y1="33" x2="57" y2="57" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
    <polygon points="57,57 51,51 60,51" fill="#4f8ef7"/>
  </g>

  <!-- Arrow from config -->
  <g opacity="0.9">
    <line x1="44" y1="91" x2="57" y2="71" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <polygon points="57,71 51,71 55,78" fill="#a78bfa"/>
  </g>

  <!-- Central engine node -->
  <circle cx="67" cy="64" r="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <circle cx="67" cy="64" r="11" fill="#1e293b"/>
  <text x="67" y="68.5" font-family="monospace" font-size="11" font-weight="bold" fill="#f8fafc" text-anchor="middle">C#</text>

  <!-- Arrow to output -->
  <g opacity="0.9">
    <line x1="81" y1="64" x2="85" y2="64" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="86,64 82,61 82,67" fill="#34d399"/>
  </g>

  <!-- Output C# file (right) — x=86, width=34 -->
  <g filter="url(#glow)">
    <rect x="86" y="43" width="34" height="42" rx="4" fill="url(#outputGrad)" opacity="0.95"/>
    <!-- Folded corner -->
    <path d="M111 43 L120 52 L111 52 Z" fill="#065f46"/>
    <rect x="111" y="43" width="9" height="9" rx="1" fill="#047857"/>
    <!-- Code lines -->
    <rect x="91" y="57" width="20" height="2.5" rx="1" fill="#ffffff60"/>
    <rect x="91" y="62" width="15" height="2.5" rx="1" fill="#ffffff40"/>
    <rect x="91" y="67" width="18" height="2.5" rx="1" fill="#ffffff40"/>
    <rect x="91" y="72" width="12" height="2.5" rx="1" fill="#ffffff30"/>
    <!-- .cs label -->
    <rect x="86" y="77" width="34" height="8" rx="0" fill="#047857" opacity="0.8"/>
    <text x="103" y="83.5" font-family="monospace" font-size="5" fill="#6ee7b7" text-anchor="middle">.cs</text>
  </g>

</svg>
