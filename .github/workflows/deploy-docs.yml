name: Deploy docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docs/docfx/**'
      - 'docs/_site/index.html'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Allow this workflow to write to GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; cancel any in-progress run on new push
concurrency:
  group:              pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore solution
        run: dotnet restore

      - name: Install DocFX
        run: dotnet tool install --global docfx

      - name: Build DocFX site
        run: docfx docs/docfx/docfx.json
        # Outputs to docs/_site as configured in docfx.json

      - name: Copy landing page into _site root
        run: |
          # index.html is already in docs/_site/ — nothing to copy.
          # This step is a no-op but makes the intent explicit.
          echo "docs/_site contents:"
          ls docs/_site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
